<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppStore Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between">

    <header class="max-w-6xl w-full mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center border-b border-gray-800 gap-4">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-sm">A</div>
            <span class="text-lg font-bold tracking-tight text-white">AppStudio Digital Hub</span>
        </div>
        
        <div class="relative w-full sm:w-64">
            <input type="text" id="searchBar" onkeyup="searchApps()" placeholder="Search apps or versions..." class="w-full bg-gray-900 text-sm text-white pl-4 pr-10 py-2 rounded-xl border border-gray-800 focus:outline-none focus:border-blue-500 transition">
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto px-6 py-12 flex-grow">
        <h2 class="text-2xl font-extrabold text-white mb-8 tracking-tight">Available Applications</h2>
        
        <div id="catalogGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="max-w-6xl w-full mx-auto px-6 py-8 flex flex-col sm:flex-row justify-between items-center border-t border-gray-900 text-xs text-gray-600 gap-4">
        <p>&copy; 2026 AppStudio. All download nodes encrypted via SSL.</p>
        <div class="flex space-x-4">
            <a href="privacy.html" class="hover:underline">Privacy Policy</a>
            <a href="YOUR_GENERAL_FEEDBACK_FORM_URL" target="_blank" class="hover:underline text-blue-500">Submit Feedback</a>
        </div>
    </footer>

    <script>
        // 1. YOUR APP DATABASE: Whenever you make a new app, just add a new item {} to this list!
        const appsDatabase = [
            {
                name: "DataExtractor Pro",
                version: "v1.2.4",
                description: "Automate web scraping and file compiling tasks instantly.",
                price: "$5.00",
                demoLink: "YOUR_GDRIVE_DEMO_LINK_1",
                buyLink: "YOUR_ORDER_FORM_LINK_1",
                rating: "⭐⭐⭐⭐★ (4.8)"
            },
            {
                name: "FileCompressor Ultra",
                version: "v2.0.0",
                description: "Lossless compression tool built for heavy distribution tasks.",
                price: "$4.50",
                demoLink: "YOUR_GDRIVE_DEMO_LINK_2",
                buyLink: "YOUR_ORDER_FORM_LINK_2",
                rating: "⭐⭐⭐⭐⭐ (5.0)"
            },
            {
                name: "ImgResizer Mini",
                version: "v1.0.1",
                description: "Batch image scaling utility optimized for bulk workflows.",
                price: "Free",
                demoLink: "YOUR_GDRIVE_DEMO_LINK_3",
                buyLink: "#",
                rating: "⭐⭐⭐⭐★ (4.2)"
            }
        ];

        // 2. RENDER ENGINE: Automatically builds the UI elements from the database array
        function renderCatalog(apps) {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = ""; // Clear existing elements
            
            if(apps.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 text-sm col-span-full py-8 text-center">No apps match your search criteria.</p>`;
                return;
            }

            apps.forEach(app => {
                const card = `
                    <div class="bg-gray-950 p-6 rounded-2xl border border-gray-900 flex flex-col justify-between shadow-lg hover:border-gray-800 transition duration-200">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-white tracking-tight">${app.name}</h3>
                                <span class="text-xs font-mono px-2 py-0.5 bg-gray-900 text-gray-400 border border-gray-800 rounded">${app.version}</span>
                            </div>
                            <p class="text-xs text-gray-500 mb-3">${app.rating}</p>
                            <p class="text-sm text-gray-400 line-clamp-3 mb-6">${app.description}</p>
                        </div>
                        <div>
                            <div class="text-xl font-black text-white mb-4">${app.price}</div>
                            <div class="grid grid-cols-2 gap-3">
                                <a href="${app.demoLink}" target="_blank" class="text-center text-xs font-medium bg-gray-900 hover:bg-gray-800 text-gray-300 py-2.5 px-3 rounded-xl border border-gray-800 transition">Try Demo</a>
                                ${app.price === 'Free' ? '' : `<a href="${app.buyLink}" target="_blank" class="text-center text-xs font-semibold bg-blue-600 hover:bg-blue-500 text-white py-2.5 px-3 rounded-xl transition shadow-md shadow-blue-600/10">Buy Now</a>`}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // 3. LIVE FILTER SEARCH ENGINE
        function searchApps() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filteredApps = appsDatabase.filter(app => 
                app.name.toLowerCase().includes(query) || 
                app.version.toLowerCase().includes(query) ||
                app.description.toLowerCase().includes(query)
            );
            renderCatalog(filteredApps);
        }

        // Initial launch load
        renderCatalog(appsDatabase);
    </script>
</body>
</html>
