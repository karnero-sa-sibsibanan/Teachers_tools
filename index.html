<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Catalog</title>
    <script src="https://cdn.tailwindcss.com/4.0.0"></script>
</head>
<body class="bg-black text-gray-100 min-h-screen font-sans antialiased selection:bg-blue-500/30 selection:text-blue-200">

    <main class="max-w-6xl mx-auto px-4 py-16">
        <header class="mb-12 border-b border-gray-950 pb-8">
            <h1 class="text-4xl font-extrabold text-white tracking-tight sm:text-5xl">Software Catalog</h1>
            <p class="mt-3 text-base text-gray-500 max-w-2xl">Discover utility tools, specialized educational computing environments, and pipeline performance engines built for real workflows.</p>
        </header>

        <!-- Dynamic Catalog Target Grid -->
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards are automatically generated here by the JavaScript engine below -->
        </div>
    </main>

    <!-- Connect your shared central database code asset -->
    <script src="products.js"></script>

    <script>
        const grid = document.getElementById('productsGrid');
        
        // Loop through everything declared in products.js automatically
        Object.keys(productsDatabase).forEach(key => {
            const product = productsDatabase[key];
            
            // Generate clean base container layout frame for the software item card
            const card = document.createElement('div');
            card.className = "bg-gray-950/40 border border-gray-900 rounded-2xl p-6 flex flex-col justify-between hover:border-gray-800 hover:bg-gray-950/80 transition-all duration-300 shadow-sm hover:shadow-md group";
            
            card.innerHTML = `
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-[10px] font-bold uppercase tracking-wider bg-gray-900 text-gray-400 px-2.5 py-1 rounded-md border border-gray-800/60 group-hover:border-blue-900/40 group-hover:text-blue-400 transition-colors duration-300">
                            ${product.category}
                        </span>
                        <span class="text-xs text-gray-600 font-mono">${product.version}</span>
                    </div>
                    
                    <h3 class="font-bold text-white tracking-tight text-xl mb-2 group-hover:text-blue-400 transition-colors duration-300">
                        ${product.name}
                    </h3>
                    
                    <p class="text-gray-400 text-sm leading-relaxed mb-6">
                        ${product.shortDescription}
                    </p>
                </div>
                
                <div class="flex items-center justify-between pt-4 border-t border-gray-950">
                    <div class="flex flex-col">
                        <span class="text-[10px] uppercase font-bold text-gray-600 tracking-wider">License Rate</span>
                        <span class="text-white font-semibold text-sm">${product.price}</span>
                    </div>
                    
                    <a href="product.html?app=${encodeURIComponent(key)}" class="inline-flex items-center text-xs font-semibold bg-gray-900 text-gray-200 border border-gray-800 hover:border-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2.5 rounded-xl transition-all duration-200 shadow-inner">
                        Get Application
                    </a>
                </div>
            `;
            
            grid.appendChild(card);
        });
    </script>
</body>
</html>
