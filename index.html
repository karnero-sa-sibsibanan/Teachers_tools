<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Catalog</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
</head>
<body class="bg-black text-gray-100 min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-blue-500/30 selection:text-blue-200">

    <!-- Main Content Container -->
    <main class="max-w-6xl w-full mx-auto px-4 py-16 flex-grow">
        <header class="mb-12 border-b border-gray-950 pb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-white tracking-tight sm:text-5xl">Software Catalog</h1>
                <p class="mt-3 text-base text-gray-500 max-w-2xl">Discover utility tools, specialized educational computing environments, and pipeline performance engines.</p>
            </div>
            
            <!-- Dynamic Search Engine Bar -->
            <div class="w-full md:w-80 relative">
                <input type="text" id="catalogSearch" placeholder="Search applications..." class="w-full bg-gray-950 text-gray-200 placeholder-gray-600 text-sm border border-gray-900 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-600 transition-colors">
            </div>
        </header>

        <!-- Dynamic Catalog Target Grid -->
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards are automatically generated here -->
        </div>
        
        <!-- Empty State View if search fails -->
        <div id="emptyState" class="hidden text-center py-12 text-gray-600 text-sm">
            No matching tools found in the registry registry base.
        </div>
    </main>

    <!-- Footer Segment Container -->
    <footer class="border-t border-gray-950 bg-black/40 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-gray-600">
            <div>
                &copy; 2026 karnero-sa-sibsibanan. All rights reserved.
            </div>
            <div class="flex items-center gap-4">
                <a href="privacy.html" class="hover:text-gray-400 transition-colors underline decoration-gray-800 underline-offset-4">Privacy Policy</a>
                <span>•</span>
                <span class="font-mono">v1.0.0</span>
            </div>
        </div>
    </footer>

    <!-- Connect shared database file -->
    <script src="products.js"></script>

    <script>
        const grid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('catalogSearch');
        const emptyState = document.getElementById('emptyState');
        
        function renderCatalog(searchTerm = '') {
            grid.innerHTML = '';
            let matchCount = 0;
            const query = searchTerm.toLowerCase().trim();

            Object.keys(productsDatabase).forEach(key => {
                const product = productsDatabase[key];
                
                // Search filter verification rules
                if (product.name.toLowerCase().includes(query) || 
                    product.category.toLowerCase().includes(query) || 
                    product.shortDescription.toLowerCase().includes(query)) {
                    
                    matchCount++;
                    const card = document.createElement('div');
                    card.className = "bg-gray-950/40 border border-gray-900 rounded-2xl p-6 flex flex-col justify-between hover:border-gray-800 hover:bg-gray-950/80 transition-all duration-300 shadow-sm hover:shadow-md group";
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-[10px] font-bold uppercase tracking-wider bg-gray-900 text-gray-400 px-2.5 py-1 rounded-md border border-gray-800/60 group-hover:border-blue-900/40 group-hover:text-blue-400 transition-colors duration-300">
                                    ${product.category}
                                </span>
                                <span class="text-xs text-gray-600 font-mono">${product.version}</span>
                            </div>
                            <h3 class="font-bold text-white tracking-tight text-xl mb-2 group-hover:text-blue-400 transition-colors duration-300">
                                ${product.name}
                            </h3>
                            <p class="text-gray-400 text-sm leading-relaxed mb-6">
                                ${product.shortDescription}
                            </p>
                        </div>
                        <div class="flex items-center justify-between pt-4 border-t border-gray-950">
                            <div class="flex flex-col">
                                <span class="text-[10px] uppercase font-bold text-gray-600 tracking-wider">License Rate</span>
                                <span class="text-white font-semibold text-sm">${product.price}</span>
                            </div>
                            <a href="product.html?app=${encodeURIComponent(key)}" class="inline-flex items-center text-xs font-semibold bg-gray-900 text-gray-200 border border-gray-800 hover:border-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2.5 rounded-xl transition-all duration-200 shadow-inner">
                                Get Application
                            </a>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (matchCount === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }
        }

        // Search Listener Engine Engine Hook
        searchInput.addEventListener('input', (e) => renderCatalog(e.target.value));

        // Initial application boot compilation trigger
        renderCatalog();
    </script>
</body>
</html>
