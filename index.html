<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnero Sa Sibsibanan</title>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
</head>
<body class="bg-[#f8fafc] text-slate-700 min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-emerald-100 selection:text-emerald-900">

    <!-- Top Accent Pastel Gradient Line -->
    <div class="h-1 bg-gradient-to-r from-emerald-200 via-teal-200 to-rose-200"></div>

    <!-- Main Content Container -->
    <main class="max-w-6xl w-full mx-auto px-4 py-12 md:py-16 flex-grow">
        <header class="mb-12 border-b border-slate-200 pb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-6">
            <div class="flex items-center gap-4">
                <!-- Main Website Logo Placeholder -->
                <div class="w-12 h-12 md:w-14 md:h-14 bg-white border border-slate-200/80 rounded-2xl overflow-hidden flex-shrink-0 p-1 shadow-sm">
                    <img src="logo.png" alt="Karnero Sa Sibsibanan Logo" class="w-full h-full object-cover rounded-xl bg-slate-50" onerror="this.style.display='none'">
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight sm:text-3xl md:text-4xl">Karnero Sa Sibsibanan</h1>
                    <p class="mt-1 text-xs sm:text-sm text-slate-500 max-w-2xl">Discover utility tools, specialized educational computing environments, and pipeline performance engines built for deep space execution.</p>
                </div>
            </div>
            
            <!-- Dynamic Search Engine Bar -->
            <div class="w-full md:w-80 relative">
                <input type="text" id="catalogSearch" placeholder="Search applications..." class="w-full bg-white text-slate-800 placeholder-slate-400 text-sm border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-300 focus:ring-4 focus:ring-emerald-500/10 transition-all shadow-sm">
            </div>
        </header>

        <!-- Dynamic Catalog Target Grid -->
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards are automatically generated here -->
        </div>
        
        <!-- Empty State View -->
        <div id="emptyState" class="hidden text-center py-12 text-slate-400 text-sm">
            No matching tools found in the registry base.
        </div>
    </main>

    <!-- Footer Segment Container -->
    <footer class="border-t border-slate-200 bg-white/80 backdrop-blur-sm py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-400">
            <div>
                &copy; 2026 karnero-sa-sibsibanan. All rights reserved.
            </div>
            <div class="flex items-center gap-4">
                <a href="privacy.html" class="hover:text-emerald-600 transition-colors underline decoration-slate-200 hover:decoration-emerald-300 underline-offset-4">Privacy Policy</a>
                <span>•</span>
                <span class="font-mono text-[10px] bg-slate-50 border border-slate-100 px-2 py-0.5 rounded text-slate-500">v1.0.0</span>
            </div>
        </div>
    </footer>

    <!-- Connect shared database file -->
    <script src="products.js"></script>

    <script>
        const grid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('catalogSearch');
        const emptyState = document.getElementById('emptyState');
        
        function renderCatalog(searchTerm = '') {
            grid.innerHTML = '';
            let matchCount = 0;
            const query = searchTerm.toLowerCase().trim();

            Object.keys(productsDatabase).forEach(key => {
                const product = productsDatabase[key];
                
                if (product.name.toLowerCase().includes(query) || 
                    product.category.toLowerCase().includes(query) || 
                    product.shortDescription.toLowerCase().includes(query)) {
                    
                    matchCount++;
                    const card = document.createElement('div');
                    
                    // Card color theme: Clean white background with subtle border, shifting to a soft emerald-pastel border on hover
                    card.className = "bg-white border border-slate-200 rounded-2xl p-6 flex flex-col justify-between hover:border-emerald-200 hover:shadow-md transition-all duration-300 group";
                    
                    // 1. SMART DECODER: Handles both standard URLs and Base64 scrambled links seamlessly
                    let finalIconUrl = '';
                    if (product.secureIconUrl) {
                        if (product.secureIconUrl.startsWith('http://') || product.secureIconUrl.startsWith('https://') || product.secureIconUrl.startsWith('.')) {
                            finalIconUrl = product.secureIconUrl;
                        } else {
                            try { 
                                finalIconUrl = atob(product.secureIconUrl); 
                            } catch(e) { 
                                console.error("Failed decoding icon string for: " + product.name, e);
                            }
                        }
                    }
            
                    // 2. Decode the secure FB URL for the reviews link on the card
                    let ratingHTML = `<span class="text-amber-500 font-medium">${product.rating || '★ 5.0'}</span>`;
                    if (product.secureFbUrl) {
                        try {
                            const clearFbUrl = atob(product.secureFbUrl);
                            ratingHTML = `
                                <span class="text-amber-500 font-medium">${product.rating || '★ 5.0'}</span>
                                <a href="${clearFbUrl}" target="_blank" class="text-slate-400 hover:text-emerald-600 underline decoration-slate-200 hover:decoration-emerald-300 underline-offset-2 transition-colors ml-1 text-[11px]">
                                    (Reviews)
                                </a>
                            `;
                        } catch(e) {}
                    }
            
                    card.innerHTML = `
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-[10px] font-bold uppercase tracking-wider bg-slate-50 text-slate-500 px-2.5 py-1 rounded-md border border-slate-200 group-hover:border-emerald-100 group-hover:text-emerald-700 group-hover:bg-emerald-50 transition-colors duration-300">
                                    ${product.category}
                                </span>
                                <span class="text-xs text-slate-400 font-mono">${product.version}</span>
                            </div>
                            
                            <!-- Application Identity Header -->
                            <div class="flex items-start gap-4 mb-3">
                                <div class="w-12 h-12 bg-slate-50 border border-slate-100 rounded-xl overflow-hidden flex-shrink-0 p-0.5 shadow-sm flex items-center justify-center text-xs font-mono text-slate-400">
                                    ${finalIconUrl ? `
                                        <img src="${finalIconUrl}" alt="${product.name} Icon" class="w-full h-full object-cover rounded-lg" onerror="this.parentElement.innerHTML='🤖'">
                                    ` : '🤖'}
                                </div>
                                <div>
                                    <h3 class="font-bold text-slate-800 tracking-tight text-lg group-hover:text-emerald-700 transition-colors duration-300">
                                        ${product.name}
                                    </h3>
                                    <div class="text-xs mt-0.5 flex items-center gap-1">${ratingHTML}</div>
                                </div>
                            </div>
            
                            <p class="text-slate-500 text-sm leading-relaxed mb-6 line-clamp-3">
                                ${product.shortDescription}
                            </p>
                        </div>
                        <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                            <div class="flex flex-col">
                                <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">License Rate</span>
                                <span class="text-slate-700 font-semibold text-sm">${product.price}</span>
                            </div>
                            <!-- Button color theme: Soft pastel slate turning into a gentle solid pastel mint block on hover -->
                            <a href="product.html?app=${encodeURIComponent(key)}" class="inline-flex items-center text-xs font-semibold bg-slate-50 text-slate-600 border border-slate-200 hover:border-emerald-200 hover:bg-emerald-50 hover:text-emerald-800 px-4 py-2.5 rounded-xl transition-all duration-200 shadow-sm">
                                Download Free Version
                            </a>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (matchCount === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }
        }
        searchInput.addEventListener('input', (e) => renderCatalog(e.target.value));
        renderCatalog();
    </script>
</body>
</html>
